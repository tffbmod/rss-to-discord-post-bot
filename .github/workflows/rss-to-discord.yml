name: RSS to Discord

on:
  schedule:
    - cron: "*/7 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rss-to-discord
  cancel-in-progress: true

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests==2.31.0

      - name: Run RSS checker
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DISCORD_ALERT_WEBHOOK: ${{ secrets.DISCORD_ALERT_WEBHOOK }}
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python check_feed.py

      - name: Commit and push state files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add last_seen.json failure_state.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update state"
            git push
          fi
